# Full dev stack (hot reload). Run: docker compose -f docker-compose.dev.yml up
# App: API http://localhost:3000, Vite http://localhost:5173 (proxies /health and /api)

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data_dev:/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./backend/src:/app/backend/src
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      MONGODB_URI: mongodb://mongodb:27017/mygarden
    depends_on:
      - mongodb
      - minio

volumes:
  mongo_data_dev:
  minio_data_dev:
